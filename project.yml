name: FontManager
options:
  bundleIdPrefix: co.trumancreative
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  WOFF2Kit:
    type: library.static
    platform: macOS
    sources:
      - path: ThirdParty/brotli/common
        buildPhase: sources
      - path: ThirdParty/brotli/dec
        buildPhase: sources
      - path: ThirdParty/brotli/enc
        buildPhase: sources
      - path: ThirdParty/woff2/src
        buildPhase: sources
      - path: WOFF2Kit
        buildPhase: sources
    settings:
      base:
        PRODUCT_NAME: WOFF2Kit
        GCC_C_LANGUAGE_STANDARD: c11
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ThirdParty/woff2/include"
          - "$(SRCROOT)/ThirdParty/woff2/src"
          - "$(SRCROOT)/ThirdParty/brotli/include"
        GCC_WARN_INHIBIT_ALL_WARNINGS: YES
        CLANG_WARN_DOCUMENTATION_COMMENTS: NO

  FontManager:
    type: application
    platform: macOS
    sources:
      - FontManager
    dependencies:
      - target: WOFF2Kit
      - package: Sparkle
    info:
      path: FontManager/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: "public.app-category.utilities"
        NSHumanReadableCopyright: "© 2026 Trey Hardin · MIT Licensed"
        # Sparkle auto-update
        SUFeedURL: "https://github.com/treyhardin/font-manager/releases/latest/download/appcast.xml"
        SUPublicEDKey: "m/iJK41QKnw6jETwwNI/u7nedlGifF6y8VaDi9e2LpY="
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.trumancreative.FontManager
        PRODUCT_NAME: Font Manager
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: FontManager/FontManager-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/WOFF2Kit"
        OTHER_LDFLAGS:
          - "-lc++"
    entitlements:
      path: FontManager/FontManager.entitlements
      properties:
        com.apple.security.app-sandbox: false
